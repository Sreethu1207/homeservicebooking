{% extends 'admin/admin_dashboard.html' %}
{% block content %}
<div class="col-sm-12 col-xl-12">
<form method="post">
    {% csrf_token %}
        <div class="mb-3">
        <label for="date" class="form-label">Date:</label>
        <input type="text" class="form-control" id="date" value="{{data.date}}" name="date" readonly>
    </div>
    <div class="mb-3">
        <label for="name" class="form-label">Name:</label>
        <input type="text" class="form-control" id="name" value="{{data.name}}"  name="uname" readonly>
    </div>
    <div class="mb-3">
        <label for="complaint" class="form-label">Complaint:</label>
        <textarea class="form-control" id="complaint" name="complaint" readonly>{{data.complaint}}</textarea>
    </div>

    <div class="mb-3">
        <label  class="form-label">Reply:</label>
        <input type="text" class="form-control" name="reply">
    </div>
    <div>
        <a><button type="submit" class="btn btn-outline-primary">Submit</button></a>
    </div>
     {% for message in messages %}
    <div class="alert alert-primary" role="alert">
        {{ message }}
    </div>
    {% endfor %}
</form>
</div>
{% endblock %}

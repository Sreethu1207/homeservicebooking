{% extends 'admin/admin_dashboard.html' %}
{% block content %}
<table class="table table-hover">
    <tr>
        <th>Username</th>
        <th>Name</th>
        <th>Address</th>
        <th>Contact</th>

    </tr>
    {% for i in data %}
    <tr>
        <td>{{i.user.username}}</td>
        <td>{{i.name}}</td>
        <td>{{i.address}}</td>
        <td>{{i.contact}}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}

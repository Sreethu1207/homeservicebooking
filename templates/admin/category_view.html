{% extends 'admin/admin_dashboard.html' %}
{% block content %}
<table class="table table-hover">
    <tr>
        <th>Service category</th>
        <th></th>
    </tr>
    {% for i in data %}
    <tr>
        <td>{{i.category}}</td>
        <td><a href="{% url 'category_delete' i.id%}"><button class="btn btn-danger">Delete</button></a></td>
    </tr>
    {% endfor %}
</table>

{% endblock %}

{% extends 'user/user_dashboard.html' %}
{% load crispy_forms_tags %}
{% block content %}

<div class="container mt-5">

    <!-- Back Button -->
    <div class="mb-4">
        <a href="{% url 'user_dashboard' %}"
           class="btn btn-outline-primary rounded-pill px-4 shadow-sm">
            ← Back
        </a>
    </div>

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <!-- Report Card -->
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

                <!-- Header -->
                <div class="card-header bg-primary text-white text-center py-4">
                    <h3 class="mb-0">
                        Report a Service Issue
                    </h3>
                </div>

                <!-- Form Body -->
                <div class="card-body p-5">

                    <form method="post">

                        {% csrf_token %}

                        <!-- Crispy Form -->
                        <div class="mb-4">
                            {{ form|crispy }}
                        </div>

                        <!-- Submit Button -->
                        <div class="text-center">
                            <button type="submit"
                                    class="btn btn-primary rounded-pill px-5 py-2 shadow-sm">
                                Submit Report
                            </button>
                        </div>

                    </form>

                    <!-- Messages -->
                    {% for message in messages %}
                    <div class="alert alert-primary mt-4 rounded-3 text-center"
                         role="alert">
                        {{ message }}
                    </div>
                    {% endfor %}

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}

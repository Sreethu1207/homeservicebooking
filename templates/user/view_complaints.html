{% extends 'user/user_dashboard.html' %}
{% load crispy_forms_tags %}
{% block content %}
<table class="table table-hover">
    <tr>
        <th>Date</th>
        <th>Complaints</th>
        <th>Reply</th>
        <th></th>

    </tr>
    {% for i in data %}
    <tr>
        <td>{{i.date}}</td>
        <td>{{i.complaint}}</td>
        <td>
        {% if i.reply == None %}
            <p>pending</p>
        {% else %}
            <p>{{i.reply}}</p>
        </td>
        {% endif %}
        {% if i.reply == None %}
        <td>
            <a href="{% url 'delete_complaints' i.id %}"><button class="btn btn-danger">Delete</button></a>
        </td>
        {% endif %}
    </tr>
    {% endfor %}
</table>
{% endblock %}

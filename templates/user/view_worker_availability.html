{% extends 'user/user_dashboard.html' %}
{% block content %}
<table class="table table-hover">
    <tr>
        <th>Date</th>
        <th>Time</th>
        <th></th>
    </tr>
    {% for i in data %}
    <tr>
        <td>{{i.date}}</td>
        <td>{{i.time}}</td>
         <td>
             {% if i.booking_status == False %}
             <a href="{% url 'book_appointment' i.id %}"><button class="btn btn-danger">Book Now</button></a>
             {% else %}
             <p>Booked</p>
             {% endif %}
         </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}

{% extends 'user/user_dashboard.html' %}
{% block content %}
<div class="col-sm-12 col-xl-12">
<table class="table table-hover">
    {% for i in data %}
    <tr>
        <th>Name</th>
        <td>{{i.name}}</td>
    </tr>
    <tr>
        <th>Address</th>
        <td>{{i.address}}</td>
    </tr>
    <tr>
        <th>Contact</th>
        <td>{{i.contact}}</td>
    </tr>
<!--    <tr><th colspan="2"><a>change Username</a></th></tr>-->
<!--    <tr><th colspan="2"><a>change Password</a></th></tr>-->
    {% endfor %}
</table>
    <div>
       <a href="{% url 'update_user_profile' %}"><button class="btn btn-primary">Update</button></a>
    </div>
</div>
{% endblock %}

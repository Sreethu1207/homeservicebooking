{% extends 'worker/worker_dashboard.html' %}
{% block content %}
<div class="col-sm-12 col-xl-12">
    {% for i in data %}
     <img src="{{ i.image.url }}" alt="Profile Image" width="120" height="120" style="object-fit: cover; border-radius: 8px;">
<table class="table table-hover">
    <tr>
        <th>Name</th>
        <td>{{i.name}}</td>
    </tr>
    <tr>
        <th>Address</th>
        <td>{{i.address}}</td>
    </tr>
    <tr>
        <th>Contact</th>
        <td>{{i.contact}}</td>
    </tr>
    <tr>
        <th>PayPal Email</th>
        <td>{{i.paypal_email}}</td>
    </tr>
    <tr>
        <th>Experience</th>
        <td>{{i.experience}}</td>
    </tr>
<!--    <tr><th colspan="2"><a>change Username</a></th></tr>-->
<!--    <tr><th colspan="2"><a>change Password</a></th></tr>-->
    {% endfor %}
</table>
    <div>
       <a href="{% url 'update_worker_profile' %}"><button class="btn btn-primary">Update</button></a>
    </div>
</div>
{% endblock %}

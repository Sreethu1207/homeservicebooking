{% extends 'worker/worker_dashboard.html' %}
{% block content %}
{% load crispy_forms_tags %}
<div class="col-xl-6">
<form method="post">
    {% csrf_token %}
    {{form|crispy}}
    <button class="btn btn-primary">Submit</button>
    {% for message in messages %}
    <div class="alert alert-primary mt-2" role="alert">
        {{message}}
    </div>
    {% endfor %}
</form>
</div>
{% endblock %}
